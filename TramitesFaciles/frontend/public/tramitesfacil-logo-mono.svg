<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradText" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e3a8a"></stop>
      <stop offset="100%" style="stop-color:#22c55e"></stop>
    </linearGradient>
  </defs>

  <!-- Fondo -->
  <rect width="100%" height="100%" fill="white"></rect>

  <!-- Círculo principal -->
  <circle cx="200" cy="150" r="100" fill="none" stroke="#22c55e" stroke-width="10"></circle>

  <!-- Clipboard -->
  <rect x="140" y="80" width="120" height="140" rx="15" fill="#3b82f6"></rect>
  <rect x="150" y="100" width="100" height="100" rx="10" fill="white"></rect>

  <!-- Check -->
  <polyline points="170,150 190,170 230,130" fill="none" stroke="#22c55e" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"></polyline>

  <!-- Iconos -->
  <circle cx="200" cy="40" r="20" fill="#f97316"></circle>
  <circle cx="320" cy="150" r="20" fill="#22c55e"></circle>
  <circle cx="200" cy="260" r="20" fill="#3b82f6"></circle>
  <circle cx="80" cy="150" r="20" fill="#ef4444"></circle>

  <!-- Texto -->
  <text x="200" y="350" font-size="40" text-anchor="middle" fill="url(#gradText)" font-family="Arial, sans-serif" font-weight="bold">
    TRÁMITES
  </text>
</svg>